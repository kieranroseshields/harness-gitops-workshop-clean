apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: podinfo
spec:
  generators:
    - git:
        repoURL: https://github.com/kieranroseshields/harness-gitops-workshop-clean.git
        revision: main
        files:
          - path: configs/git-generator-files-discovery/cluster-config/**/config.json
  template:
    metadata:
      name: "{{cluster.namespace}}-podinfo"
    spec:
      project: default
      source:
        repoURL: https://github.com/kieranroseshields/harness-gitops-workshop-clean.git
        targetRevision: main
        path: configs/git-generator-files-discovery/apps/podinfo
      destination:
        server: "{{cluster.address}}"
        namespace: "{{cluster.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
